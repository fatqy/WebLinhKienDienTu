<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Hồ sơ cá nhân')}"></head>
<style>
    .profile-container { max-width: 800px; margin: 40px auto; display: flex; gap: 30px; }
    .profile-sidebar { flex: 1; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); height: fit-content; }
    .profile-main { flex: 2; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    .sidebar-menu { list-style: none; margin-top: 20px; }
    .sidebar-menu li { margin-bottom: 10px; }
    .sidebar-menu a { display: block; padding: 10px; color: #333; border-radius: 4px; transition: 0.3s; }
    .sidebar-menu a:hover, .sidebar-menu a.active { background: #f5f5f5; color: var(--primary-red); font-weight: bold; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 8px; font-weight: 500; color: #666; }
    .form-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px; outline: none; }
    .btn-update { background: var(--primary-red); color: white; border: none; padding: 12px 30px; border-radius: 4px; font-weight: bold; cursor: pointer; transition: 0.3s; }
    .btn-update:hover { background: #c10015; }
    .alert-success { background: #e8f5e9; color: #2e7d32; padding: 15px; border-radius: 4px; margin-bottom: 20px; border: 1px solid #c8e6c9; }
</style>
<body>
    <header th:replace="~{fragments :: header}"></header>

    <main class="container profile-container">
        <!-- Sidebar -->
        <aside class="profile-sidebar">
            <div style="text-align: center; margin-bottom: 20px;">
                <div style="width: 80px; height: 80px; background: #eee; border-radius: 50%; margin: 0 auto; display: flex; align-items: center; justify-content: center; font-size: 30px; color: #999;">
                    <i class="fas fa-user"></i>
                </div>
                <h3 th:text="${user.fullName}" style="margin-top: 10px;">User Full Name</h3>
                <p th:text="${user.username}" style="font-size: 13px; color: #999;">@username</p>
            </div>
            <ul class="sidebar-menu">
                <li><a href="/profile" class="active"><i class="fas fa-id-card"></i> Thông tin tài khoản</a></li>
                <li><a href="/order-history"><i class="fas fa-history"></i> Lịch sử đơn hàng</a></li>
                <li><a href="/logout" style="color: var(--primary-red); border-top: 1px solid #eee; margin-top: 10px; padding-top: 15px;"><i class="fas fa-sign-out-alt"></i> Đăng xuất</a></li>
            </ul>
        </aside>

        <!-- Main Content -->
        <div class="profile-main">
            <h2 style="margin-bottom: 25px; text-transform: uppercase;">Thông tin tài khoản</h2>
            
            <div th:if="${param.success}" class="alert-success">
                Cập nhật thông tin thành công!
            </div>

            <form th:action="@{/profile/update}" method="post">
                <div class="form-group">
                    <label>Họ và tên</label>
                    <input type="text" name="fullName" th:value="${user.fullName}" placeholder="Nhập họ và tên đầy đủ">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" th:value="${user.email}" placeholder="Nhập địa chỉ email">
                </div>
                <div class="form-group">
                    <label>Số điện thoại</label>
                    <input type="text" name="phoneNumber" th:value="${user.phoneNumber}" placeholder="Nhập số điện thoại">
                </div>
                <div class="form-group">
                    <label>Địa chỉ giao hàng mặc định</label>
                    <input type="text" name="address" th:value="${user.address}" placeholder="Số nhà, tên đường, phường/xã...">
                </div>
                <button type="submit" class="btn-update">LƯU THAY ĐỔI</button>
            </form>
        </div>
    </main>

    <footer th:replace="~{fragments :: footer}"></footer>
</body>
</html>
