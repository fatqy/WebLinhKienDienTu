<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập – GEARVN.COM</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .login-container {
            max-width: 400px;
            margin: 50px auto;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-header h2 {
            color: var(--primary-red);
            text-transform: uppercase;
        }
        .form-group {
            margin-bottom: 20px;
            position: relative;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            outline: none;
            box-sizing: border-box;
        }
        .password-toggle {
            position: absolute;
            right: 12px;
            top: 42px;
            cursor: pointer;
            color: #666;
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            background: var(--primary-red);
            color: #fff;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
        }
        .forgot-password {
            text-align: right;
            margin-top: -15px;
            margin-bottom: 15px;
            font-size: 13px;
        }
        .forgot-password a {
            color: #666;
            text-decoration: none;
        }
        .error-msg {
            color: red;
            background: #ffebee;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 14px;
            text-align: center;
        }
        .login-footer {
            margin-top: 20px;
            text-align: center;
            font-size: 14px;
        }
        .login-footer a {
            color: var(--primary-red);
            font-weight: bold;
        }
    </style>
</head>
<body style="background-color: #f5f5f5;">

    <div class="login-container">
        <div class="login-header">
            <div class="logo" style="margin-bottom: 10px;">GEARVN</div>
            <h2>Đăng nhập</h2>
        </div>

        <!-- Thông báo lỗi từ Spring Security -->
        <div th:if="${param.error}" class="error-msg">
            Tên đăng nhập hoặc mật khẩu không chính xác.
        </div>
        
        <div th:if="${param.logout}" class="error-msg" style="color: green; background: #e8f5e9;">
            Bạn đã đăng xuất thành công.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label for="username">Tên đăng nhập</label>
                <input type="text" id="username" name="username" placeholder="Nhập tên đăng nhập" required>
            </div>
            <div class="form-group">
                <label for="password">Mật khẩu</label>
                <input type="password" id="password" name="password" placeholder="Nhập mật khẩu" required>
                <i class="fa-solid fa-eye-slash password-toggle" id="togglePassword" style="top: 42px;"></i>
            </div>
            <div class="forgot-password">
                <a href="/forgot-password">Quên mật khẩu?</a>
            </div>
            <button type="submit" class="btn-login">ĐĂNG NHẬP</button>
        </form>

        <div class="login-footer">
            Chưa có tài khoản? <a href="/register">Đăng ký ngay</a>
        </div>
    </div>

    <script>
        const togglePassword = document.querySelector('#togglePassword');
        const password = document.querySelector('#password');

        togglePassword.addEventListener('click', function (e) {
            const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
            password.setAttribute('type', type);
            this.classList.toggle('fa-eye');
            this.classList.toggle('fa-eye-slash');
        });
    </script>
</body>
</html>
