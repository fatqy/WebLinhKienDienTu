<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch sử đơn hàng – GEARVN.COM</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .order-card { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 25px; border: 1px solid #eee; }
        .order-header { display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding-bottom: 15px; margin-bottom: 15px; }
        .order-id { font-weight: bold; color: #333; }
        .order-status { padding: 5px 15px; border-radius: 20px; font-size: 13px; font-weight: 500; }
        .status-PENDING { background: #fff3e0; color: #ef6c00; }
        .status-CONFIRMED { background: #e3f2fd; color: #1976d2; }
        .status-SHIPPING { background: #e8f5e9; color: #2e7d32; }
        .status-COMPLETED { background: #f1f8e9; color: #33691e; }
        .order-items-list { list-style: none; }
        .order-item-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 14px; }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-main"><div class="container"><div class="logo"><a href="/" style="color: var(--primary-red);">GEARVN</a></div></div></div>
    </header>

    <main class="container">
        <h2 style="margin: 30px 0;">Lịch sử đơn hàng của bạn</h2>
        
        <div th:if="${param.success}" class="alert-error" style="background: #e8f5e9; color: #2e7d32; margin-bottom: 20px;">
            Chúc mừng! Bạn đã đặt hàng thành công.
        </div>

        <div th:if="${#lists.isEmpty(orders)}" style="text-align: center; padding: 50px;">
            <p>Bạn chưa có đơn hàng nào.</p>
            <a href="/" style="color: var(--primary-red);">Mua hàng ngay</a>
        </div>

        <div th:each="order : ${orders}" class="order-card">
            <div class="order-header">
                <div>
                    <span class="order-id" th:text="'Đơn hàng #' + ${order.id}">#123</span>
                    <span style="color: #999; margin-left: 15px;" th:text="${#temporals.format(order.orderDate, 'dd/MM/yyyy HH:mm')}">Date</span>
                </div>
                <span th:class="'order-status status-' + ${order.status}" th:text="${order.status}">PENDING</span>
            </div>
            <div class="order-body">
                <ul class="order-items-list">
                    <li th:each="item : ${order.orderItems}" class="order-item-row">
                        <span th:text="${item.product.name} + ' x' + ${item.quantity}">Product Name x1</span>
                        <span th:text="${#numbers.formatDecimal(item.price * item.quantity, 0, 'COMMA', 0, 'POINT') + '₫'}">Price</span>
                    </li>
                </ul>
                <div style="text-align: right; margin-top: 15px; font-size: 18px; font-weight: bold;">
                    Tổng tiền: <span style="color: var(--primary-red);" th:text="${order.getFormattedTotalAmount()}">Total</span>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
