<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/layout :: layout(~{::content})}">
<body>
    <div th:fragment="content">
        <h2 style="margin-bottom: 25px;">QUẢN LÝ ĐƠN HÀNG</h2>
        
        <table class="admin-table">
            <thead>
                <tr>
                    <th>Mã đơn</th>
                    <th>Khách hàng</th>
                    <th>Ngày đặt</th>
                    <th>Tổng cộng</th>
                    <th>Trạng thái hiện tại</th>
                    <th>Cập nhật trạng thái</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="order : ${orders}">
                    <td th:text="'#' + ${order.id}">#1</td>
                    <td>
                        <div th:text="${order.fullName}" style="font-weight: bold;">Name</div>
                        <div th:text="${order.phoneNumber}" style="font-size: 12px; color: #666;">Phone</div>
                    </td>
                    <td th:text="${#temporals.format(order.orderDate, 'dd/MM/yyyy HH:mm')}">Date</td>
                    <td th:text="${order.getFormattedTotalAmount()}" style="color: var(--primary-red); font-weight: bold;">0₫</td>
                    <td>
                        <span th:class="'order-status status-' + ${order.status}" th:text="${order.status}">PENDING</span>
                    </td>
                    <td>
                        <form th:action="@{/admin/orders/update-status}" method="post" style="display: flex; gap: 5px;">
                            <input type="hidden" name="orderId" th:value="${order.id}">
                            <select name="status" style="padding: 5px; border-radius: 4px;">
                                <option value="PENDING" th:selected="${order.status == 'PENDING'}">PENDING</option>
                                <option value="CONFIRMED" th:selected="${order.status == 'CONFIRMED'}">CONFIRMED</option>
                                <option value="SHIPPING" th:selected="${order.status == 'SHIPPING'}">SHIPPING</option>
                                <option value="COMPLETED" th:selected="${order.status == 'COMPLETED'}">COMPLETED</option>
                                <option value="CANCELLED" th:selected="${order.status == 'CANCELLED'}">CANCELLED</option>
                            </select>
                            <button type="submit" class="btn-action" style="background: #2ecc71; color: white;">CẬP NHẬT</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
