<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout(content)">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard – GEARVN.COM</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { display: flex; min-height: 100vh; }
        .admin-sidebar { width: 250px; background: #2c3e50; color: white; padding: 20px; flex-shrink: 0; }
        .admin-sidebar h2 { font-size: 20px; border-bottom: 1px solid #444; padding-bottom: 15px; margin-bottom: 20px; text-align: center; color: var(--primary-red); }
        .admin-menu { list-style: none; }
        .admin-menu li { margin-bottom: 15px; }
        .admin-menu a { color: #ecf0f1; display: flex; align-items: center; gap: 10px; padding: 10px; border-radius: 4px; transition: 0.3s; }
        .admin-menu a:hover { background: #34495e; color: var(--primary-red); }
        .admin-content { flex-grow: 1; background: #f4f7f6; padding: 40px; }
        .card-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 40px; }
        .stat-item { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-left: 5px solid var(--primary-red); }
        .stat-item h4 { color: #7f8c8d; font-size: 14px; text-transform: uppercase; margin-bottom: 10px; }
        .stat-item p { font-size: 24px; font-weight: bold; color: #2c3e50; }
        .admin-table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; }
        .admin-table th, .admin-table td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        .admin-table th { background: #ecf0f1; }
        .btn-action { padding: 5px 10px; border-radius: 4px; border: none; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>
    <aside class="admin-sidebar">
        <h2>GEARVN ADMIN</h2>
        <ul class="admin-menu">
            <li><a href="/admin/dashboard"><i class="fas fa-tachometer-alt"></i> Bảng điều khiển</a></li>
            <li><a href="/admin/categories"><i class="fas fa-list"></i> Quản lý danh mục</a></li>
            <li><a href="/admin/products"><i class="fas fa-box"></i> Quản lý sản phẩm</a></li>
            <li><a href="/admin/orders"><i class="fas fa-shopping-bag"></i> Quản lý đơn hàng</a></li>
            <li><a href="/admin/users"><i class="fas fa-users"></i> Quản lý người dùng</a></li>
            <li><a href="/admin/reviews"><i class="fas fa-star"></i> Quản lý đánh giá</a></li>
            <li style="margin-top: 50px;"><a href="/"><i class="fas fa-arrow-left"></i> Về trang chủ</a></li>
            <li><a href="/logout"><i class="fas fa-sign-out-alt"></i> Đăng xuất</a></li>
        </ul>
    </aside>

    <main class="admin-content">
        <div th:replace="${content}"></div>
    </main>
</body>
</html>
